<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unrestricted Web Portal</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar / Header Area -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-orb"></div>
                <h1>Unrestricted<br><span>Portal</span></h1>
            </div>
            
            <div class="control-panel">
                <p class="description">Bypass Same-Origin Policy and X-Frame-Options to browse directly in your dashboard.</p>
                
                <div class="input-group">
                    <label for="urlInput">Target URLs (One per line)</label>
                    <textarea id="urlInput" placeholder="https://example.com&#10;https://wikipedia.org" rows="5"></textarea>
                </div>
                
                <div class="action-buttons">
                    <button id="openTabsBtn" class="btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        Open Tabs
                    </button>
                    <button id="formatLinksBtn" class="btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        Format Links
                    </button>
                    <button id="openIframesBtn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                        Open in Iframes
                    </button>
                </div>
            </div>

            <div class="status-indicator">
                <div class="pulse-dot"></div>
                Proxy Server Active
            </div>
        </aside>

        <!-- Main Gallery Area -->
        <main class="gallery-container">
            <header class="gallery-header">
                <h2>Your Live Grid</h2>
                <div class="view-controls">
                    <button class="icon-btn active" title="Grid View">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </button>
                </div>
            </header>
            
            <div class="formatted-links" id="formattedLinks" style="display: none;">
                <!-- Formatted links injected here -->
            </div>
            
            <div class="gallery" id="gallery">
                <!-- Iframes injected here via JS -->
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
