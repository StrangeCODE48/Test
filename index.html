<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Background Link Opener + Iframe Viewer</title>
<style>
  body {
    font-family: Inter, Arial, sans-serif;
    background: #f3f6fb;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .card {
    max-width: 720px;
    width: 100%;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(17,24,39,0.08);
  }
  textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    resize: vertical;
    font-size: 14px;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  button {
    flex: 1;
    padding: 10px;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }
  .primary { background:#0b74ff; color:white; }
  .ghost   { background:#eef2ff; color:#0b74ff; }
  .green   { background:#22c55e; color:white; }
  #linkList {
    margin-top:12px;
    max-height:150px;
    overflow:auto;
    padding:8px;
    border-radius:6px;
    border:1px dashed #e6eefc;
    background:#fbfdff;
  }
  .small { font-size:13px; color:#475569; }

  /* iframe viewer styles */
  #iframeViewer {
    margin-top: 16px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  iframe {
    width: 100%;
    height: 400px;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  /* Mobile responsiveness */
  @media (max-width:600px) {
    iframe { height: 300px; }
    .card { padding: 15px; }
    button { font-size: 13px; padding: 8px; }
  }
</style>
</head>
<body>
  <div class="card">
    <h3>Extract links & open</h3>
    <p class="small">Paste text containing links. You can open in background tabs or inside this page with iframes.</p>

    <textarea id="input" placeholder="Paste text here..."></textarea>

    <div class="row">
      <button class="primary" id="openBtn">Open in background</button>
      <button class="ghost" id="previewBtn">Show extracted links</button>
      <button class="green" id="iframeBtn">Open in iframe viewer</button>
    </div>

    <div id="linkList"></div>
    <div id="iframeViewer"></div>
  </div>

<script>
const rx = /https?:\/\/[^\s"'<>()]+/gi;

function extract(text){
  const matches = text.match(rx) || [];
  const seen = new Set(); const out = [];
  for(const u of matches){
    const cleaned = u.replace(/[.,;:)\]]+$/,'');
    if(!seen.has(cleaned)){ seen.add(cleaned); out.push(cleaned); }
  }
  return out;
}

document.getElementById('previewBtn').addEventListener('click', ()=>{
  const links = extract(document.getElementById('input').value);
  const list = document.getElementById('linkList');
  list.innerHTML = links.length ? 
    links.map(l=>`<div><a href="${l}" target="_blank" rel="noopener">${l}</a></div>`).join('') 
    : '<i class="small">No links found</i>';
});

document.getElementById('openBtn').addEventListener('click', ()=>{
  const links = extract(document.getElementById('input').value);
  if(links.length===0){ alert('No links found'); return; }
  (async ()=>{
    for(let i=0;i<links.length;i++){
      try{
        const w = window.open(links[i], '_blank', 'noopener');
        if(w){ try{ w.blur(); } catch(e){} }
      } catch(err){ console.warn('open failed', err); }
      await new Promise(r => setTimeout(r, 250));
      try{ window.focus(); } catch(e){}
    }
    setTimeout(()=>{ try{ window.focus(); }catch(e){} }, 400);
    alert('Done trying to open ' + links.length + ' links (best-effort).');
  })();
});

document.getElementById('iframeBtn').addEventListener('click', ()=>{
  const links = extract(document.getElementById('input').value);
  const viewer = document.getElementById('iframeViewer');
  viewer.innerHTML = "";
  if(links.length===0){
    viewer.style.display = "none";
    alert('No links found'); return;
  }
  viewer.style.display = "flex";
  links.forEach(url=>{
    const frame = document.createElement('iframe');
    frame.src = url;
    viewer.appendChild(frame);
  });
});
</script>
</body>
</html>
